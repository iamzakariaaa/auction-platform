spring:
  application:
    name: auction-platform

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  multipart:
    max-file-size: 5MB
    max-request-size: 40MB

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000

auction:
  images:
    storage-location: uploads/auctions
  lifecycle:
    interval: 30000

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always
